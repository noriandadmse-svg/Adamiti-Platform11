<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آدميتي — الخدمات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs,
             query, orderBy, where, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "adamitii.firebaseapp.com",
      projectId:         "adamitii",
      storageBucket:     "adamitii.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser  = null;
    let currentRole  = 'mustafeed';
    let activeFilter = 'all';

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/auth'; return; }
      currentUser = user;

      document.getElementById('user-name').textContent  = user.displayName || '';
      document.getElementById('user-email').textContent = user.email || '';
      document.getElementById('user-avatar').src        = user.photoURL || '';

      const { getDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snap = await getDoc(doc(db, 'users', user.uid));
      currentRole = snap.exists() ? (snap.data().role || 'mustafeed') : 'mustafeed';

      const badge = document.getElementById('role-badge');
      badge.textContent = currentRole === 'mufeed' ? 'مفيد' : 'مستفيد';
      badge.className   = 'role-badge ' + currentRole;

      // أظهر زر "أضف خدمة" للمفيد فقط
      if (currentRole === 'mufeed') {
        document.getElementById('btn-add-service').style.display = 'flex';
      }

      loadServices();
    });

    // تحميل الخدمات
    async function loadServices() {
      const grid = document.getElementById('services-grid');
      grid.innerHTML = '<div class="loading">جارٍ التحميل...</div>';

      try {
        let q = query(collection(db, 'services'), orderBy('createdAt', 'desc'));
        if (activeFilter !== 'all') {
          q = query(collection(db, 'services'),
            where('category', '==', activeFilter),
            orderBy('createdAt', 'desc'));
        }

        const snap = await getDocs(q);

        if (snap.empty) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🌱</div>
              <h3>لا توجد خدمات بعد</h3>
              <p>كن أول من يضيف خدمة لمجتمع آدميتي</p>
            </div>`;
          return;
        }

        grid.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          grid.appendChild(buildCard(doc.id, d));
        });
      } catch(e) {
        grid.innerHTML = '<div class="loading" style="color:#b91c1c">تعذّر تحميل الخدمات</div>';
      }
    }

    function buildCard(id, d) {
      const el = document.createElement('div');
      el.className = 'service-card';
      const cats = { design:'تصميم', dev:'تطوير', content:'محتوى', consult:'استشارات', other:'أخرى' };
      const catLabel = cats[d.category] || 'أخرى';
      const isOwner  = currentUser && d.ownerId === currentUser.uid;
      el.innerHTML = `
        <div class="card-header">
          <span class="cat-tag">${catLabel}</span>
          ${isOwner ? '<span class="owner-tag">خدمتي</span>' : ''}
        </div>
        <h3 class="card-title">${d.title || ''}</h3>
        <p class="card-desc">${d.description || ''}</p>
        <div class="card-footer">
          <span class="card-owner">${d.ownerName || 'مجهول'}</span>
          <button class="btn-contact" ${isOwner ? 'disabled' : ''}>
            ${isOwner ? 'خدمتك' : 'تواصل'}
          </button>
        </div>`;
      return el;
    }

    // فلتر الفئات
    window.setFilter = (el, filter) => {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      loadServices();
    };

    // فتح/إغلاق مودال الإضافة
    window.openModal  = () => document.getElementById('modal').classList.add('open');
    window.closeModal = () => {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('add-form').reset();
      document.getElementById('form-error').style.display = 'none';
    };

    // إضافة خدمة
    window.submitService = async () => {
      const title    = document.getElementById('f-title').value.trim();
      const desc     = document.getElementById('f-desc').value.trim();
      const category = document.getElementById('f-category').value;
      const errEl    = document.getElementById('form-error');

      if (!title || !desc || !category) {
        errEl.textContent = 'يرجى ملء جميع الحقول';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = 'جارٍ الإضافة...';

      try {
        await addDoc(collection(db, 'services'), {
          title, description: desc, category,
          ownerId:   currentUser.uid,
          ownerName: currentUser.displayName || 'مجهول',
          status:    'active',
          createdAt: serverTimestamp()
        });
        closeModal();
        loadServices();
        showToast('تمت إضافة خدمتك بنجاح');
      } catch(e) {
        errEl.textContent = 'حدث خطأ، حاول مرة أخرى';
        errEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'نشر الخدمة';
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    window.logout = () => signOut(auth).then(() => window.location.href = '/auth');
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #f5f3ef;
      --surface:  #faf9f7;
      --border:   #dddbd5;
      --text:     #1e1e1c;
      --muted:    #888780;
      --dim:      #b4b2a9;
      --accent:   #4a6fa5;
      --accent-l: #eef4fb;
      --accent-b: #c5d8ee;
      --green:    #3d7a5f;
      --green-l:  #eaf4ef;
      --green-b:  #b8d9c9;
      --r: 12px;
    }

    html, body { min-height: 100%; font-family: 'Tajawal', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── SIDEBAR ── */
    .sidebar { position: fixed; top: 0; right: 0; width: 240px; height: 100%; background: var(--surface); border-left: 0.5px solid var(--border); display: flex; flex-direction: column; padding: 24px 0; z-index: 10; }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 0.5px solid var(--border); }
    .logo-mark { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark svg { width: 18px; height: 18px; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text small { display: block; font-size: 11px; font-weight: 300; color: var(--muted); }
    .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--dim); letter-spacing: 0.8px; padding: 10px 10px 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; border: none; background: none; width: 100%; text-align: right; font-family: 'Tajawal', sans-serif; transition: background .15s, color .15s; text-decoration: none; }
    .nav-item:hover  { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--accent-l); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    .soon { font-size: 10px; background: var(--bg); color: var(--dim); border: 0.5px solid var(--border); border-radius: 10px; padding: 1px 7px; margin-right: auto; }
    .sidebar-user { padding: 16px 16px 0; border-top: 0.5px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--accent-l); }
    .user-info { flex: 1; min-width: 0; }
    .user-info strong { display: block; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info span   { display: block; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .role-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; margin-bottom: 10px; }
    .role-badge.mufeed    { background: var(--accent-l); color: var(--accent); border: 0.5px solid var(--accent-b); }
    .role-badge.mustafeed { background: var(--green-l);  color: var(--green);  border: 0.5px solid var(--green-b); }
    .btn-logout { width: 100%; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border); background: none; font-family: 'Tajawal', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s; }
    .btn-logout:hover { border-color: #fca5a5; color: #b91c1c; }

    /* ── MAIN ── */
    .main { margin-right: 240px; padding: 36px 40px; min-height: 100vh; }

    /* ── TOP BAR ── */
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .top-bar h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .top-bar p  { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .btn-add {
      display: none; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--r);
      border: none; background: var(--accent); color: #fff;
      font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .18s;
    }
    .btn-add:hover { background: #3d5f8f; }
    .btn-add svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn { padding: 7px 16px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--surface); font-family: 'Tajawal', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s; }
    .filter-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── GRID ── */
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    .service-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 20px; display: flex; flex-direction: column; gap: 10px; transition: border-color .18s, box-shadow .18s; }
    .service-card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-l); }

    .card-header { display: flex; align-items: center; gap: 6px; }
    .cat-tag   { font-size: 11px; background: var(--accent-l); color: var(--accent); border: 0.5px solid var(--accent-b); border-radius: 8px; padding: 2px 9px; font-weight: 600; }
    .owner-tag { font-size: 11px; background: var(--green-l); color: var(--green); border: 0.5px solid var(--green-b); border-radius: 8px; padding: 2px 9px; font-weight: 600; }

    .card-title { font-size: 15px; font-weight: 700; }
    .card-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; flex: 1; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .card-owner  { font-size: 12px; color: var(--dim); }

    .btn-contact { padding: 7px 16px; border-radius: 8px; border: 0.5px solid var(--accent-b); background: var(--accent-l); color: var(--accent); font-family: 'Tajawal', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-contact:hover:not(:disabled)   { background: var(--accent); color: #fff; }
    .btn-contact:disabled { opacity: .4; cursor: default; }

    /* ── STATES ── */
    .loading { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .empty-state p  { font-size: 13px; color: var(--muted); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); backdrop-filter: blur(4px); z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }

    .modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .btn-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 4px; line-height: 1; }
    .btn-close:hover { color: var(--text); }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); }

    input, textarea, select {
      font-family: 'Tajawal', sans-serif; font-size: 14px; color: var(--text);
      background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px;
      padding: 10px 12px; outline: none; width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-l); }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .form-error { display: none; margin-bottom: 12px; padding: 10px 14px; background: #fef2f2; border: 0.5px solid #fca5a5; border-radius: 8px; font-size: 13px; color: #b91c1c; }

    .btn-submit { width: 100%; padding: 12px; border-radius: var(--r); border: none; background: var(--accent); color: #fff; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .18s; margin-top: 4px; }
    .btn-submit:hover    { background: #3d5f8f; }
    .btn-submit:disabled { opacity: .5; cursor: default; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 100; }
    .toast.show { opacity: 1; }

    @media (max-width: 900px) { .services-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px) { .sidebar { display: none; } .main { margin-right: 0; padding: 20px; } }
    @media (max-width: 560px) { .services-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
        </svg>
      </div>
      <div class="logo-text">آدميتي <small>Adamiti Platform</small></div>
    </div>
    <nav class="nav">
      <div class="nav-label">الرئيسية</div>
      <a class="nav-item" href="/dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        لوحة التحكم
      </a>
      <div class="nav-label">المنصة</div>
      <a class="nav-item active" href="/services">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        الخدمات
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        المشاريع
        <span class="soon">قريباً</span>
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        المجتمع
        <span class="soon">قريباً</span>
      </a>
      <div class="nav-label">حسابي</div>
      <a class="nav-item" href="/profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ملفي الشخصي
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <img class="user-avatar" id="user-avatar" src="" alt="" />
        <div class="user-info">
          <strong id="user-name"></strong>
          <span id="user-email"></span>
        </div>
      </div>
      <div id="role-badge" class="role-badge"></div>
      <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="top-bar">
      <div>
        <h1>الخدمات</h1>
        <p>اكتشف ما يقدمه مجتمع آدميتي — أو شارك بخدمتك</p>
      </div>
      <button class="btn-add" id="btn-add-service" onclick="openModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        أضف خدمة
      </button>
    </div>

    <!-- فلاتر -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(this,'all')">الكل</button>
      <button class="filter-btn" onclick="setFilter(this,'design')">تصميم</button>
      <button class="filter-btn" onclick="setFilter(this,'dev')">تطوير</button>
      <button class="filter-btn" onclick="setFilter(this,'content')">محتوى</button>
      <button class="filter-btn" onclick="setFilter(this,'consult')">استشارات</button>
      <button class="filter-btn" onclick="setFilter(this,'other')">أخرى</button>
    </div>

    <!-- الشبكة -->
    <div class="services-grid" id="services-grid">
      <div class="loading">جارٍ التحميل...</div>
    </div>
  </main>

  <!-- ── MODAL إضافة خدمة ── -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h2>إضافة خدمة جديدة</h2>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <form id="add-form" onsubmit="event.preventDefault(); submitService()">
        <div class="form-group">
          <label>عنوان الخدمة</label>
          <input id="f-title" type="text" placeholder="مثال: تصميم هوية بصرية احترافية" maxlength="80" />
        </div>
        <div class="form-group">
          <label>وصف الخدمة</label>
          <textarea id="f-desc" placeholder="اشرح ما تقدمه بوضوح..." maxlength="400"></textarea>
        </div>
        <div class="form-group">
          <label>الفئة</label>
          <select id="f-category">
            <option value="">اختر فئة</option>
            <option value="design">تصميم</option>
            <option value="dev">تطوير</option>
            <option value="content">محتوى</option>
            <option value="consult">استشارات</option>
            <option value="other">أخرى</option>
          </select>
        </div>
        <div class="form-error" id="form-error"></div>
        <button class="btn-submit" id="btn-submit" type="submit">نشر الخدمة</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</body>
</html>
