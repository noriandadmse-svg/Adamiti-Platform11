<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطور - منصة Adamiti</title>
    <style>
        #public-gate {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .gate-box {
            padding: 30px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background-color: #161b22;
        }
        input {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: white;
            text-align: center;
            font-size: 16px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            background-color: #238636;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        #dev-platform {
            display: none;
        }
    </style>
</head>
<body>

    <div id="public-gate">
        <div class="gate-box">
            <h2>المنصة في مرحلة التحول والتطوير 🛠️</h2>
            <p>الوصول متاح حالياً للمطورين عبر الرمز السري.</p>
            <input type="password" id="dev-code" placeholder="أدخل رمز المطور"><br>
            <button onclick="checkGate()">فتح المنصة</button>
        </div>
    </div>

    <div id="dev-platform">
        
        </div>

    <script>
        function checkGate() {
            var code = document.getElementById('dev-code').value;
            if (code === "1234") {
                document.getElementById('public-gate').style.display = 'none';
                document.getElementById('dev-platform').style.display = 'block';
            } else {
                alert("الرمز غير صحيح! الوصول مرفوض.");
            }
        }
    </script>
</body>
</html>
