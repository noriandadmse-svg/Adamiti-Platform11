<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آدميتي — ملفي الشخصي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script type="module">
    import { firebaseConfig } from '/platform/config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/auth'; return; }
      currentUser = user;

      const snap = await getDoc(doc(db, 'users', user.uid));
      const data = snap.exists() ? snap.data() : {};

      // بيانات الشريط الجانبي
      document.getElementById('user-name').textContent  = user.displayName || '';
      document.getElementById('user-email').textContent = user.email || '';
      document.getElementById('user-avatar').src        = user.photoURL || '';
      document.getElementById('sidebar-avatar').src     = user.photoURL || '';

      const role      = data.role || 'mustafeed';
      const isMufeed  = role === 'mufeed';

      // الشارة
      ['role-badge','role-badge-header'].forEach(id => {
        const el = document.getElementById(id);
        el.textContent  = isMufeed ? 'مفيد' : 'مستفيد';
        el.className    = 'role-badge ' + (isMufeed ? 'mufeed' : 'mustafeed');
      });

      // هيدر البروفايل
      document.getElementById('profile-name').textContent = user.displayName || '';
      document.getElementById('profile-email').textContent = user.email || '';
      document.getElementById('profile-since').textContent =
        'عضو منذ ' + new Date(user.metadata.creationTime).toLocaleDateString('ar-SA', { year:'numeric', month:'long' });

      // حقول التعديل
      document.getElementById('field-bio').value      = data.bio      || '';
      document.getElementById('field-location').value = data.location || '';
      document.getElementById('field-website').value  = data.website  || '';

      // اختيار الدور الحالي
      document.querySelectorAll('.role-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.role === role);
      });
    });

    // حفظ البيانات
    window.saveProfile = async () => {
      if (!currentUser) return;
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'جارٍ الحفظ...';

      const selectedRole = document.querySelector('.role-option.selected')?.dataset.role || 'mustafeed';

      try {
        await setDoc(doc(db, 'users', currentUser.uid), {
          bio:       document.getElementById('field-bio').value.trim(),
          location:  document.getElementById('field-location').value.trim(),
          website:   document.getElementById('field-website').value.trim(),
          role:      selectedRole,
          updatedAt: serverTimestamp()
        }, { merge: true });

        showToast('تم حفظ التغييرات بنجاح');
        // تحديث الشارة
        const isMufeed = selectedRole === 'mufeed';
        ['role-badge','role-badge-header'].forEach(id => {
          const el = document.getElementById(id);
          el.textContent = isMufeed ? 'مفيد' : 'مستفيد';
          el.className   = 'role-badge ' + (isMufeed ? 'mufeed' : 'mustafeed');
        });
      } catch(e) {
        showToast('حدث خطأ، حاول مرة أخرى', 'error');
      }

      btn.disabled = false;
      btn.textContent = 'حفظ التغييرات';
    };

    // تبديل الدور
    window.selectRole = (el) => {
      document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    };

    // إشعار
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => t.className = 'toast', 2800);
    }

    window.logout = () => signOut(auth).then(() => window.location.href = '/auth');
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #f5f3ef;
      --surface:  #faf9f7;
      --border:   #dddbd5;
      --text:     #1e1e1c;
      --muted:    #888780;
      --dim:      #b4b2a9;
      --accent:   #4a6fa5;
      --accent-l: #eef4fb;
      --accent-b: #c5d8ee;
      --green:    #3d7a5f;
      --green-l:  #eaf4ef;
      --green-b:  #b8d9c9;
      --r: 12px;
    }

    html, body {
      min-height: 100%;
      font-family: 'Tajawal', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 240px; height: 100%;
      background: var(--surface);
      border-left: 0.5px solid var(--border);
      display: flex; flex-direction: column;
      padding: 24px 0;
      z-index: 10;
    }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 0.5px solid var(--border);
    }
    .logo-mark {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-mark svg { width: 18px; height: 18px; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text small { display: block; font-size: 11px; font-weight: 300; color: var(--muted); }

    .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--dim); letter-spacing: 0.8px; padding: 10px 10px 6px; }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: var(--muted);
      cursor: pointer; border: none; background: none;
      width: 100%; text-align: right;
      font-family: 'Tajawal', sans-serif;
      transition: background .15s, color .15s;
      text-decoration: none;
    }
    .nav-item:hover  { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--accent-l); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    .soon { font-size: 10px; background: var(--bg); color: var(--dim); border: 0.5px solid var(--border); border-radius: 10px; padding: 1px 7px; margin-right: auto; }

    .sidebar-user { padding: 16px 16px 0; border-top: 0.5px solid var(--border); }
    .user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--accent-l); }
    .user-info { flex: 1; min-width: 0; }
    .user-info strong { display: block; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info span   { display: block; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .role-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; margin-bottom: 10px; }
    .role-badge.mufeed    { background: var(--accent-l); color: var(--accent); border: 0.5px solid var(--accent-b); }
    .role-badge.mustafeed { background: var(--green-l);  color: var(--green);  border: 0.5px solid var(--green-b); }

    .btn-logout { width: 100%; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border); background: none; font-family: 'Tajawal', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s; }
    .btn-logout:hover { border-color: #fca5a5; color: #b91c1c; }

    /* ── MAIN ── */
    .main { margin-right: 240px; padding: 36px 40px; min-height: 100vh; }

    /* ── PROFILE HEADER ── */
    .profile-header {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--accent-l);
      border: 2px solid var(--border);
    }

    .profile-meta { flex: 1; }
    .profile-meta h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
    .profile-meta .email { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .profile-meta .since { font-size: 12px; color: var(--dim); }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .form-card h3 {
      font-size: 15px; font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 0.5px solid var(--border);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label { font-size: 12px; font-weight: 600; color: var(--muted); }

    input, textarea {
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-l);
    }

    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    /* ── ROLE SELECTOR ── */
    .role-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .role-option {
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: border-color .18s, background .18s;
      background: var(--bg);
    }

    .role-option:hover    { border-color: var(--accent); background: var(--accent-l); }
    .role-option.selected { border-color: var(--accent); background: var(--accent-l); }
    .role-option.selected.green-sel { border-color: var(--green); background: var(--green-l); }

    .role-option-icon { font-size: 22px; flex-shrink: 0; }
    .role-option h4   { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .role-option p    { font-size: 12px; color: var(--muted); }

    /* ── ACTIONS ── */
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    .btn-save {
      padding: 11px 28px;
      border-radius: var(--r);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .btn-save:hover    { background: #3d5f8f; }
    .btn-save:disabled { opacity: .5; cursor: default; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 10px 22px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
      z-index: 100;
    }
    .toast.show   { opacity: 1; }
    .toast.error  { background: #b91c1c; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-right: 0; padding: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .role-options { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>
        </svg>
      </div>
      <div class="logo-text">آدميتي <small>Adamiti Platform</small></div>
    </div>

    <nav class="nav">
      <div class="nav-label">الرئيسية</div>
      <a class="nav-item" href="/dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        لوحة التحكم
      </a>

      <div class="nav-label">المنصة</div>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        الخدمات
        <span class="soon">قريباً</span>
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        المشاريع
        <span class="soon">قريباً</span>
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        المجتمع
        <span class="soon">قريباً</span>
      </a>

      <div class="nav-label">حسابي</div>
      <a class="nav-item active" href="/profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ملفي الشخصي
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-row">
        <img class="user-avatar" id="sidebar-avatar" src="" alt="" />
        <div class="user-info">
          <strong id="user-name"></strong>
          <span id="user-email"></span>
        </div>
      </div>
      <div id="role-badge" class="role-badge"></div>
      <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- هيدر البروفايل -->
    <div class="profile-header">
      <img class="profile-avatar" id="user-avatar" src="" alt="" />
      <div class="profile-meta">
        <h2 id="profile-name"></h2>
        <div class="email" id="profile-email"></div>
        <div id="role-badge-header" class="role-badge"></div>
        <div class="since" id="profile-since"></div>
      </div>
    </div>

    <!-- معلومات شخصية -->
    <div class="form-card">
      <h3>المعلومات الشخصية</h3>
      <div class="form-grid">
        <div class="form-group full">
          <label>نبذة عني</label>
          <textarea id="field-bio" placeholder="أخبر المجتمع عن نفسك وما تقدمه..."></textarea>
        </div>
        <div class="form-group">
          <label>الموقع الجغرافي</label>
          <input id="field-location" type="text" placeholder="مثال: الرياض، السعودية" />
        </div>
        <div class="form-group">
          <label>الموقع الإلكتروني</label>
          <input id="field-website" type="url" placeholder="https://..." />
        </div>
      </div>
    </div>

    <!-- الدور -->
    <div class="form-card">
      <h3>دوري في آدميتي</h3>
      <div class="role-options">
        <div class="role-option" data-role="mufeed" onclick="selectRole(this)">
          <div class="role-option-icon">🤝</div>
          <div>
            <h4>مفيد</h4>
            <p>أقدّم خدماتي ومشاريعي للآخرين</p>
          </div>
        </div>
        <div class="role-option green-sel" data-role="mustafeed" onclick="selectRole(this)">
          <div class="role-option-icon">🌱</div>
          <div>
            <h4>مستفيد</h4>
            <p>أبحث عن خدمات ومشاريع تناسبني</p>
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save" id="btn-save" onclick="saveProfile()">حفظ التغييرات</button>
    </div>

  </main>

  <div class="toast" id="toast"></div>

</body>
</html>
